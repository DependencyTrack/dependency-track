version: 2
updates:
  #
  # main branch
  #
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  - package-ecosystem: docker
    directory: /apiserver/src/main/docker
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  #
  # 5.0.x maintenance branch
  #
  - package-ecosystem: maven
    target-branch: 5.0.x
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: docker
    target-branch: 5.0.x
    directory: /src/main/docker
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    target-branch: 5.0.x
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  #
  # 4.14.x maintenance branch
  #
  - package-ecosystem: maven
    target-branch: 4.14.x
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
    - dependency-name: "*"
      update-types:
      - version-update:semver-major
  - package-ecosystem: docker
    target-branch: 4.14.x
    directory: /src/main/docker
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    ignore:
    - dependency-name: "*"
      update-types:
      - version-update:semver-major
  - package-ecosystem: github-actions
    target-branch: 4.14.x
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
