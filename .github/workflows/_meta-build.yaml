on:
  workflow_call:
    inputs:
      app-version:
        type: string
        required: true
        description: "the version that should be set/used as tag for the container image"
      publish-container:
        type: boolean
        required: false
        default: false
        description: "publish and scan the container image once its built"
      ref-name:
        type: string
        required: true
        description: "Short ref name of the branch or tag that triggered the workflow run"
    secrets:
      registry-0-usr:
        required: true
      registry-0-psw:
        required: true

permissions: { }

jobs:
  build-java:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # tag=v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Restore Maven build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag=v5.0.5
        with:
          path: ~/.m2/build-cache
          key: maven-build-cache-build-${{ hashFiles('.mvn/maven-build-cache-config.xml') }}-${{ github.run_id }}
          restore-keys: |
            maven-build-cache-build-${{ hashFiles('.mvn/maven-build-cache-config.xml') }}-
            maven-build-cache-build-

      - name: Setup CycloneDX CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          wget -O "$HOME/.local/bin/cyclonedx" https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.24.2/cyclonedx-linux-x64
          echo "ef0d3b31d176e02bc594f83e19cfcea053c6bc5b197351f71696e189390f851d $HOME/.local/bin/cyclonedx" | sha256sum -c
          chmod +x "$HOME/.local/bin/cyclonedx"

      - name: Build with Maven
        run: |-
          mvn -B -Pquick,dist -Dservices.bom.merge.skip=false package

      - name: Upload Distribution Archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: assembled-dist
          path: |-
            apiserver/target/dependency-track-apiserver-dist.tar.gz

      - name: Upload BOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: bom
          path: |-
            apiserver/target/bom.json

      - name: Upload v4-migrator JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: v4-migrator-jar
          path: |-
            support/v4-migrator/target/v4-migrator.jar

      - name: Extract OpenAPI Specs
        run: |-
          mkdir -p openapi-spec/v1 openapi-spec/v2
          unzip -p api/target/api-*.jar org/dependencytrack/api/v2/openapi.yaml > openapi-spec/v2/openapi.yaml
          unzip -p apiserver/target/dependency-track-apiserver.jar org/dependencytrack/api/v1/openapi.yaml > openapi-spec/v1/openapi.yaml

      - name: Upload OpenAPI Spec
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: openapi-spec
          path: openapi-spec/

  build-container:
    name: Build Container (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write # Required to push images to ghcr.io
    needs:
      - build-java
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apiserver
            context: apiserver
            artifact: assembled-dist
            prepare-cmd: tar xzf apiserver/target/dependency-track-apiserver-dist.tar.gz -C apiserver/target
          - name: v4-migrator
            context: support/v4-migrator
            artifact: v4-migrator-jar
            prepare-cmd: ":" # no-op
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag=v8.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.context }}/target

      - name: Prepare image context
        run: ${{ matrix.prepare-cmd }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # tag=v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # tag=v4.0.0
        id: buildx
        with:
          install: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # tag=v4.1.0
        if: ${{ inputs.publish-container }}
        with:
          registry: ghcr.io
          username: ${{ secrets.registry-0-usr }}
          password: ${{ secrets.registry-0-psw }}

      - name: Set Container Tags
        id: tags
        env:
          REF_NAME: ${{ inputs.ref-name }}
          APP_VERSION: ${{ inputs.app-version }}
          IMAGE: ${{ matrix.name }}
        run: |-
          shopt -s nocasematch
          if [[ ! "$APP_VERSION" =~ ^([0-9]+-snapshot|[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?(\+[A-Za-z0-9.]+)?)$ ]]; then
            echo "::error::app-version must be '<major>-snapshot' or a semver version, got: '${APP_VERSION}'"
            exit 1
          fi
          if [[ ! "$REF_NAME" =~ ^[a-zA-Z0-9_][a-zA-Z0-9._/-]{0,127}$ ]]; then
            echo "::error::ref-name is not a valid git ref: '${REF_NAME}'"
            exit 1
          fi

          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE}"
          TAGS=""

          if [[ "$REF_NAME" == feature-* ]]; then
            # OCI tags disallow '/', but git refs allow it (e.g. feature-foo/bar).
            # Lowercase and substitute '/' for '-' to produce a valid tag.
            REF_TAG="${REF_NAME,,}"
            REF_TAG="${REF_TAG//\//-}"
            TAGS="${IMAGE_NAME}:${REF_TAG}"
          else
            TAGS="${IMAGE_NAME}:${APP_VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build multi-arch Container Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # tag=v7.1.0
        with:
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |-
            APP_VERSION=${{ inputs.app-version }}
            COMMIT_SHA=${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.publish-container }}
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/src/main/docker/Dockerfile