name: Lint

on:
  push:
    branches:
      - 'main'            # Main branch
      - 'feature-**'      # Feature branch
      - '[0-9]+.[0-9]+.x' # Release branches
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - 'main'            # Main branch
      - 'feature-**'      # Feature branch
      - '[0-9]+.[0-9]+.x' # Release branches
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: { }

jobs:
  lint-java:
    name: Lint Java
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # tag=v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Lint
        run: make lint-java

  lint-protobuf:
    name: Lint Protobuf
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # tag=v1.50.0
        with:
          github_token: ${{ github.token }}
      - name: Lint Protobuf
        uses: bufbuild/buf-lint-action@06f9dd823d873146471cfaaf108a993fe00e5325 # tag=v1.1.1
        with:
          input: .

  protobuf-breaking-changes:
    name: Protobuf Breaking Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # tag=v1.50.0
        with:
          github_token: ${{ github.token }}
      - name: Detect Breaking Changes
        uses: bufbuild/buf-breaking-action@c57b3d842a5c3f3b454756ef65305a50a587c5ba # tag=v1.1.4
        with:
          input: .
          against: "https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }}"

  lint-openapi:
    name: Lint OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Lint OpenAPI Spec
        run: make lint-openapi

  lint-migrations:
    name: Lint Migrations
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch base ref
        run: git fetch --no-tags origin "${{ github.base_ref }}"
      - name: Lint changed migrations
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: make lint-migrations

  openapi-breaking-changes:
    name: OpenAPI Breaking Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Checkout base ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false
      - name: Detect Breaking Changes
        uses: oasdiff/oasdiff-action/breaking@5fbe96ede8d0c53aeadef122d7a0abb79152d493 # tag=v0.1.1
        with:
          base: base/api/src/main/openapi/openapi.yaml
          revision: api/src/main/openapi/openapi.yaml
          fail-on: ERR
          # We accept the risk of external references (GHSA-fhj3-7267-7vv5) because:
          #   * The GITHUB_TOKEN for all lint jobs has zero permissions.
          #   * All actions/checkout steps set persist-credentials to false.
          #   * Our multi-file setup requires resolving of external (file) references.
          allow-external-refs: true
