name: OpenAPI

on:
  pull_request:
    paths:
    - .github/workflows/ci-openapi.yaml
    - api/src/main/openapi/**
    - api/src/main/spectral/**
    - Makefile

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: { }

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
      with:
        persist-credentials: false
    - name: Lint OpenAPI Spec
      run: make lint-openapi

  breaking-changes:
    name: Breaking Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
      with:
        persist-credentials: false
    - name: Detect Breaking Changes
      uses: oasdiff/oasdiff-action/breaking@37bf9ff785c7315df88216660826e71be4cc03da # tag=v0.0.44
      with:
        base: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/api/src/main/openapi/openapi.yaml
        revision: api/src/main/openapi/openapi.yaml
        fail-on: ERR