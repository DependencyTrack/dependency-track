name: Publish CI

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:

permissions: { }

jobs:
  read-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Assert ref type
        run: |-
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "::error::Publishing is only supported for tags!"
            exit 1
          fi
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # tag=v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Parse Version from POM
        id: parse
        run: |-
          VERSION=$(mvn -q -Dexec.skip=true help:evaluate -Dexpression=project.version -DforceStdout)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  call-build:
    needs:
      - read-version
    uses: ./.github/workflows/_meta-build.yaml
    with:
      app-version: ${{ needs.read-version.outputs.version }}
      publish-container: true
      ref-name: ${{ github.ref_name }}
    permissions:
      packages: write # Required to push images to ghcr.io
    secrets:
      registry-0-usr: ${{ github.repository_owner }}
      registry-0-psw: ${{ github.repository_owner == 'DependencyTrack' && secrets.BOT_IMAGE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

  update-github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    needs:
      - read-version
      - call-build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          persist-credentials: false

      - name: Download Distribution Archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag=v8.0.1
        with:
          name: assembled-dist
          path: target

      - name: Download BOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag=v8.0.1
        with:
          name: bom
          path: target

      - name: Create Checksums
        run: |-
          pushd target
          echo "# SHA1" >> checksums.txt
          sha1sum dependency-track-apiserver-dist.tar.gz >> checksums.txt
          sha1sum bom.json >> checksums.txt
          echo "# SHA256" >> checksums.txt
          sha256sum dependency-track-apiserver-dist.tar.gz >> checksums.txt
          sha256sum bom.json >> checksums.txt
          echo "# SHA512" >> checksums.txt
          sha512sum dependency-track-apiserver-dist.tar.gz >> checksums.txt
          sha512sum bom.json >> checksums.txt
          popd

      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.read-version.outputs.version }}
        run: |-
          gh release upload "${RELEASE_VERSION}" \
            --clobber \
            target/dependency-track-apiserver-dist.tar.gz \
            target/bom.json \
            target/checksums.txt

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.read-version.outputs.version }}
        run: |-
          gh release edit "${RELEASE_VERSION}" \
            --draft=false
