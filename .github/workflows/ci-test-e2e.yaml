name: E2E Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: { }

jobs:
  test-e2e:
    name: Test E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # tag=v5.3.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Execute end-to-end tests
        run: make test-e2e
