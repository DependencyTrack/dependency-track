    url: https://www.apache.org/licenses/LICENSE-2.0.html
security:
- apiKeyAuth: [ ]
- bearerAuth: [ ]
servers:
- url: /api/v2
tags:
- name: Components
  description: Endpoints related to components
- name: Extensions
  description: Endpoints related to extensions
- name: Projects
  description: Endpoints related to projects
- name: Secrets
  description: Endpoints related to secrets
- name: System Capabilities
  description: Endpoints exposing the capabilities of the running server
- name: Task Queues
  description: Endpoints related to task queue management
- name: Vuln Data Sources
  description: Endpoints related to vulnerability data sources
- name: Vuln Policies
  description: Endpoints related to vulnerability policies
- name: Workflows
  description: Endpoints related to workflows

paths:
  /components:
    $ref: "./resources/components/components.yaml"
  /extension-points:
    $ref: "./resources/extensions/extension-points.yaml"
  /extension-points/{extension_point_name}/extensions:
    $ref: "./resources/extensions/extensions.yaml"
  /extension-points/{extension_point_name}/extensions/{extension_name}/config:
    $ref: "./resources/extensions/extension-config.yaml"
  /extension-points/{extension_point_name}/extensions/{extension_name}/config-schema:
    $ref: "./resources/extensions/extension-config-schema.yaml"
  /extension-points/{extension_point_name}/extensions/{extension_name}/test:
    $ref: "./resources/extensions/extension-test.yaml"
  /projects/{uuid}/clone:
    $ref: "./resources/projects/project-clone.yaml"
  /projects/{uuid}/components:
    $ref: "./resources/projects/project-components.yaml"
  /secrets:
    $ref: "./resources/secrets/secrets.yaml"
  /secrets/{name}:
    $ref: "./resources/secrets/secret.yaml"
  /vuln-policies:
    $ref: "./resources/vuln-policies/vuln-policies.yaml"
  /vuln-policies/{uuid}:
    $ref: "./resources/vuln-policies/vuln-policy.yaml"
  /vuln-policy-bundles:
    $ref: "./resources/vuln-policies/vuln-policy-bundles.yaml"
  /vuln-policy-bundles/{uuid}:
    $ref: "./resources/vuln-policies/vuln-policy-bundle.yaml"
  /vuln-policy-bundles/{uuid}/sync:
    $ref: "./resources/vuln-policies/vuln-policy-bundle-sync.yaml"
  /vuln-data-sources/{name}/mirror-runs:
    $ref: "./resources/vuln-data-sources/vuln-data-source-mirror-runs.yaml"
  /vuln-data-sources/{name}/mirror-runs/latest:
    $ref: "./resources/vuln-data-sources/vuln-data-source-mirror-run-latest.yaml"
  /internal/system-capabilities:
    $ref: "./resources/internal/system-capabilities/system-capabilities.yaml"
  /internal/task-queues/{type}:
    $ref: "./resources/internal/task-queues/task-queues.yaml"
  /internal/task-queues/{type}/{name}:
    $ref: "./resources/internal/task-queues/task-queue.yaml"
  /internal/workflow-instances/{id}:
    $ref: "./resources/internal/workflows/workflow-instance.yaml"
  /internal/workflow-runs:
    $ref: "./resources/internal/workflows/workflow-runs.yaml"
  /internal/workflow-runs/{id}:
    $ref: "./resources/internal/workflows/workflow-run.yaml"
  /internal/workflow-runs/{id}/events:
    $ref: "./resources/internal/workflows/workflow-run-events.yaml"

components:
  securitySchemes:
    apiKeyAuth:
      name: X-Api-Key
      description: Authentication via API key.
      type: apiKey
      in: header
    bearerAuth:
      description: |-
        Authentication via opaque server-issued session token.
        Tokens are obtained from `POST /api/v1/user/login` or
        `POST /api/v1/user/oidc/login`.
      type: http
      scheme: bearer
      bearerFormat: Opaque
