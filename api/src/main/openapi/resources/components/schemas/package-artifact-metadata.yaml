type: object
description: >
  Artifact-level metadata for the component's exact version from configured package repositories.
  Only present when the component has a PURL with a version, the PURL type is supported by at
  least one configured repository, and artifact metadata has been successfully resolved from an
  upstream repository. Metadata resolution is asynchronous and runs in the background after a
  component is created or updated. This field may be absent for recently created components
  until resolution completes.
properties:
  hashes:
    $ref: "../../../shared/schemas/hashes.yaml"
  published_at:
    nullable: true
    description: When this artifact was published to the repository.
    allOf:
      - $ref: "../../../shared/schemas/timestamp.yaml"
  resolved_from:
    type: string
    nullable: true
    description: Identifier of the repository from which artifact metadata was fetched.
  resolved_at:
    nullable: true
    description: When artifact metadata was last resolved from the upstream repository.
    allOf:
      - $ref: "../../../shared/schemas/timestamp.yaml"
