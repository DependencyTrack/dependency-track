get:
  operationId: getExtensionConfig
  summary: Get extension configuration
  description: |-
    Returns the configuration of an extension.

    Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
  tags:
    - Extensions
  parameters:
    - name: extension_point_name
      description: Name of the extension point
      in: path
      required: true
      schema:
        type: string
    - name: extension_name
      description: Name of the extension
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: List of extensions
      content:
        application/json:
          schema:
            $ref: "./schemas/get-extension-config-response.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "404":
      $ref: "../../shared/responses/generic-not-found-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"

put:
  operationId: updateExtensionConfig
  summary: Update extension configuration
  description: |-
    Updates the configuration of an extension.

    **Do not use clear text credentials in the supplied config**.
    Fields annotated with `x-secret-ref` in the config schema expect
    a name of a managed secret, which is resolved internally by the API.

    Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_UPDATE` permission.
  tags:
    - Extensions
  parameters:
    - name: extension_point_name
      description: Name of the extension point
      in: path
      required: true
      schema:
        type: string
    - name: extension_name
      description: Name of the extension
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./schemas/update-extension-config-request.yaml"
  responses:
    "204":
      description: Configuration updated
    "304":
      description: Not Modified
    "400":
      description: Bad Request
      content:
        application/problem+json:
          schema:
            anyOf:
              - $ref: "../../shared/schemas/json-schema-validation-problem-details.yaml"
              - $ref: "../../shared/schemas/problem-details.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "404":
      $ref: "../../shared/responses/generic-not-found-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"
