get:
  operationId: listWorkflowRunEvents
  summary: List all events of a workflow run
  description: |-
    Returns a paginated list of workflow run events, sorted by sequence number.

    Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
  tags:
    - Workflows
  parameters:
    - name: id
      description: ID of the workflow run
      in: path
      schema:
        type: string
        format: uuid
      required: true
    - name: from_sequence_number
      description: |-
        Sequence number of the last seen event.
        May be used to continuously poll for new events.
        Can not be used together with `page_token`.
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    - $ref: "../../../shared/parameters/pagination-limit.yaml"
    - $ref: "../../../shared/parameters/page-token.yaml"
    - $ref: "../../../shared/parameters/sort-direction.yaml"
  responses:
    "200":
      description: Paginated list of workflow run events
      content:
        application/json:
          schema:
            $ref: "./schemas/list-workflow-run-events-response.yaml"
    "400":
      $ref: "../../../shared/responses/invalid-request-error.yaml"
    "401":
      $ref: "../../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../../shared/responses/generic-forbidden-error.yaml"
    default:
      $ref: "../../../shared/responses/generic-error.yaml"
