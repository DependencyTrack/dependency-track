get:
  operationId: listWorkflowRuns
  summary: List all workflow runs
  description: |-
    Returns a paginated list of workflow runs.

    ### Sortable fields

    Sorting is supported for the for the following fields:

    * `id`
    * `created_at`
    * `completed_at`

    Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
  tags:
    - Workflows
  parameters:
    - name: workflow_name
      description: Name of the workflow to filter by. Must be an exact match.
      in: query
      schema:
        type: string
    - name: workflow_version
      description: Version of the workflow to filter by. Must be an exact match.
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
    - name: workflow_instance_id
      description: Workflow instance ID to filter by. Must be an exact match.
      in: query
      schema:
        type: string
    - name: status
      description: Status to filter by
      in: query
      schema:
        $ref: "./schemas/workflow-run-status.yaml"
    - name: label
      description: |-
        Filter by label in `key=value` form. Repeat to require multiple labels.
        A run matches only if it carries every supplied label.
        On duplicate keys the last occurrence wins.
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          pattern: "^[^=]+=.*$"
    - name: created_since
      description: Filter runs created on or after this timestamp.
      in: query
      schema:
        $ref: "../../../shared/schemas/timestamp.yaml"
    - name: created_before
      description: Filter runs created before this timestamp.
      in: query
      schema:
        $ref: "../../../shared/schemas/timestamp.yaml"
    - name: completed_since
      description: Filter runs completed on or after this timestamp.
      in: query
      schema:
        $ref: "../../../shared/schemas/timestamp.yaml"
    - name: completed_before
      description: Filter runs completed before this timestamp.
      in: query
      schema:
        $ref: "../../../shared/schemas/timestamp.yaml"
    - $ref: "../../../shared/parameters/pagination-limit.yaml"
    - $ref: "../../../shared/parameters/page-token.yaml"
    - $ref: "../../../shared/parameters/sort-direction.yaml"
    - $ref: "../../../shared/parameters/sort-by.yaml"
  responses:
    "200":
      description: Paginated list of workflow runs
      content:
        application/json:
          schema:
            $ref: "./schemas/list-workflow-runs-response.yaml"
    "400":
      $ref: "../../../shared/responses/invalid-request-error.yaml"
    "401":
      $ref: "../../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../../shared/responses/generic-forbidden-error.yaml"
    default:
      $ref: "../../../shared/responses/generic-error.yaml"
