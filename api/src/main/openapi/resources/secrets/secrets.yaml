get:
  operationId: listSecretMetadata
  summary: List secret metadata
  description: |-
    Returns a paginated list of secret metadata.

    Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
  tags:
    - Secrets
  parameters:
    - name: q
      description: >-
        Optional search text to filter secrets by. Filtering uses case-insensitive "starts with" semantics on the secret name.
      in: query
      schema:
        type: string
    - $ref: "../../shared/parameters/page-token.yaml"
    - $ref: "../../shared/parameters/pagination-limit.yaml"
  responses:
    "200":
      description: Paginated list of secret metadata
      content:
        application/json:
          schema:
            $ref: "./schemas/list-secrets-response.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"

post:
  operationId: createSecret
  summary: Create a secret
  description: |-
    Creates a new secret.

    Requires the `SECRET_MANAGEMENT` or `SECRET_MANAGEMENT_CREATE` permission.

    Administrators can configure the secret manager to be read-only.
    In that case, create requests will be rejected with status code `400`.
  tags:
    - Secrets
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./schemas/create-secret-request.yaml"
  responses:
    "201":
      description: Secret created
      headers:
        Location:
          description: URL of the created secret
          schema:
            type: string
            format: uri
    "400":
      description: Bad Request
      content:
        application/problem+json:
          schema:
            anyOf:
              - $ref: "../../shared/schemas/invalid-request-problem-details.yaml"
              - $ref: "../../shared/schemas/problem-details.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "409":
      $ref: "../../shared/responses/generic-conflict-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"
