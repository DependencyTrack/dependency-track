type: object
properties:
  name:
    type: string
    minLength: 1
    maxLength: 255
  description:
    type: string
    maxLength: 512
  author:
    type: string
    maxLength: 255
  condition:
    type: string
    maxLength: 4096
    minLength: 1
  analysis:
    $ref: "./vuln-policy-analysis.yaml"
  ratings:
    type: array
    items:
      $ref: "./vuln-policy-rating.yaml"
    maxItems: 3
  operation_mode:
    $ref: "./vuln-policy-operation-mode.yaml"
  priority:
    type: integer
    format: int32
    minimum: 0
    maximum: 100
    default: 0
  valid_from:
    $ref: "../../../shared/schemas/timestamp.yaml"
  valid_until:
    $ref: "../../../shared/schemas/timestamp.yaml"
required:
- name
- condition
- analysis
