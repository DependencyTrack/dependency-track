type: object
properties:
  uuid:
    type: string
    format: uuid
  name:
    type: string
  description:
    type: string
  author:
    type: string
  condition:
    type: string
  analysis:
    $ref: "./vuln-policy-analysis.yaml"
  ratings:
    type: array
    items:
      $ref: "./vuln-policy-rating.yaml"
    maxItems: 3
  operation_mode:
    $ref: "./vuln-policy-operation-mode.yaml"
  priority:
    type: integer
    format: int32
    minimum: 0
    maximum: 100
  source:
    $ref: "./vuln-policy-source.yaml"
  valid_from:
    $ref: "../../../shared/schemas/timestamp.yaml"
  valid_until:
    $ref: "../../../shared/schemas/timestamp.yaml"
  created:
    $ref: "../../../shared/schemas/timestamp.yaml"
    readOnly: true
  updated:
    $ref: "../../../shared/schemas/timestamp.yaml"
    readOnly: true
required:
- uuid
- name
- condition
- analysis
- operation_mode
- priority
- source
