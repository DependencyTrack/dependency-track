get:
  operationId: listVulnPolicyBundles
  summary: List vulnerability policy bundles
  description: |-
    Returns a list of vulnerability policy bundles.

    Requires permission `POLICY_MANAGEMENT` or `POLICY_MANAGEMENT_READ`.
  tags:
    - Vuln Policies
  responses:
    "200":
      description: List of vulnerability policy bundles
      content:
        application/json:
          schema:
            $ref: "./schemas/list-vuln-policy-bundles-response.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"
