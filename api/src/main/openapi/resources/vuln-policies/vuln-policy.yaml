get:
  operationId: getVulnPolicy
  summary: Get a vulnerability policy
  description: |-
    Returns a vulnerability policy.

    Requires permission `POLICY_MANAGEMENT` or `POLICY_MANAGEMENT_READ`.
  tags:
    - Vuln Policies
  parameters:
    - name: uuid
      in: path
      description: UUID of the vulnerability policy
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: The vulnerability policy
      content:
        application/json:
          schema:
            $ref: "./schemas/get-vuln-policy-response.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "404":
      $ref: "../../shared/responses/generic-not-found-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"

put:
  operationId: updateVulnPolicy
  summary: Replace a vulnerability policy
  description: |-
    Replaces a user-managed vulnerability policy with the provided data.

    Policies managed by a bundle can not be modified.

    Requires permission `POLICY_MANAGEMENT` or `POLICY_MANAGEMENT_UPDATE`.
  tags:
    - Vuln Policies
  parameters:
    - name: uuid
      in: path
      description: UUID of the vulnerability policy
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./schemas/update-vuln-policy-request.yaml"
  responses:
    "204":
      description: Policy updated
    "400":
      description: Bad Request
      content:
        application/problem+json:
          schema:
            anyOf:
              - $ref: "./schemas/invalid-vuln-policy-condition-problem-details.yaml"
              - $ref: "../../shared/schemas/invalid-request-problem-details.yaml"
              - $ref: "../../shared/schemas/problem-details.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "404":
      $ref: "../../shared/responses/generic-not-found-error.yaml"
    "409":
      $ref: "../../shared/responses/generic-conflict-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"

delete:
  operationId: deleteVulnPolicy
  summary: Delete a vulnerability policy
  description: |-
    Deletes a user-managed vulnerability policy.

    Policies managed by a bundle can not be deleted.

    Analysis records matched by this policy are reset upon deletion.

    Requires permission `POLICY_MANAGEMENT` or `POLICY_MANAGEMENT_DELETE`.
  tags:
    - Vuln Policies
  parameters:
    - name: uuid
      in: path
      description: UUID of the vulnerability policy
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "204":
      description: Policy deleted
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "404":
      $ref: "../../shared/responses/generic-not-found-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"
