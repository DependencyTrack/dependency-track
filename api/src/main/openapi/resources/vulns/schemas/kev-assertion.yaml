type: object
description: A single assertion that a vulnerability is known to be exploited.
properties:
  asserter:
    type: string
    description: The entity that asserted the vulnerability is known to be exploited (e.g. `CISA`, `ENISA`).
  vuln_source:
    type: string
    description: Source of the asserted vulnerability identifier (e.g. `NVD`).
  vuln_id:
    type: string
    description: The asserted vulnerability identifier (e.g. `CVE-2021-44228`).
  published_at:
    $ref: "../../../shared/schemas/timestamp.yaml"
  required_action:
    type: string
    description: Free-form remediation guidance provided by the source, if any.
  known_ransomware:
    type: boolean
    description: >-
      Whether the vulnerability is known to be used in ransomware campaigns.
      Absent when the source does not report this signal, which is distinct
      from an explicit `false`.
  description:
    type: string
    description: Short description provided by the source, if any.
  created_at:
    $ref: "../../../shared/schemas/timestamp.yaml"
  updated_at:
    $ref: "../../../shared/schemas/timestamp.yaml"
required:
- asserter
- vuln_source
- vuln_id
- created_at
- updated_at
