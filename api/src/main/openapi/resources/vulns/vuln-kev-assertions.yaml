get:
  operationId: listVulnKevAssertions
  summary: Lists KEV assertions for a vulnerability
  description: |-
    Returns all Known Exploited Vulnerability (KEV) assertions for the given
    vulnerability, including those asserted for any of its aliases.

    Requires permission `VIEW_VULNERABILITY`.
  tags:
    - Vulns
  parameters:
    - name: source
      in: path
      description: Source of the vulnerability (e.g. `NVD`, `GITHUB`, `OSV`).
      required: true
      schema:
        type: string
    - name: vuln_id
      in: path
      description: Identifier of the vulnerability (e.g. `CVE-2021-44228`).
      required: true
      schema:
        type: string
  responses:
    "200":
      description: A list of KEV assertions for the vulnerability
      content:
        application/json:
          schema:
            $ref: "./schemas/list-vuln-kev-assertions-response.yaml"
    "401":
      $ref: "../../shared/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../../shared/responses/generic-forbidden-error.yaml"
    "404":
      $ref: "../../shared/responses/generic-not-found-error.yaml"
    default:
      $ref: "../../shared/responses/generic-error.yaml"
