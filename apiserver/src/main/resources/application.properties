# Defines whether the task scheduler should be enabled.
# <br/><br/>
# May be disabled on specific nodes in the cluster to limit the amount of
# background processing they're doing. Can help with dedicating nodes to
# only serve web traffic.
#
# @category: Task Scheduling
# @type:     boolean
dt.task-scheduler.enabled=true

# Defines the number of threads the task scheduler uses to execute due tasks.
# This is the maximum number of scheduled tasks that may run concurrently on
# a single node.
# <br/><br/>
# The scheduled task volume is low, but a few tasks can be long-running,
# so the value should be large enough to keep one slow task from blocking others.
# <br/><br/>
# Note that the grunt of asynchronous work is performed by the dex engine,
# not by the task scheduler. This is the wrong knob to tweak in most cases.
#
# @category: Task Scheduling
# @type:     integer
dt.task-scheduler.threads=3

# Defines the interval in milliseconds in which the task scheduler polls the
# database for due tasks.
#
# @category: Task Scheduling
# @type:     integer
dt.task-scheduler.poll-interval-ms=30000

# Defines how long, in milliseconds, the task scheduler waits for running tasks
# to complete during shutdown. Tasks still running when this elapses are left in
# place and picked up by another node once their heartbeat expires.
#
# @category: Task Scheduling
# @type:     integer
dt.task-scheduler.shutdown-max-wait-ms=5000

