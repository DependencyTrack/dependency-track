dt.config.profile=test

# Reduce to the lowest possible value to prevent
# excessive CPU usage during tests.
dt.bcrypt.rounds=4

# Use port 0 to let the OS assign an available port during tests.
dt.management.port=0

# Tests don't need a lot of concurrent connections,
# and the churn of opening and closing them all the
# time is more harmful than it helps.
dt.datasource.pool.max-size=3
dt.datasource.pool.min-idle=3