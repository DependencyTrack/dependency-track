trigger: none
pr: none


parameters:
  - name: branch name
    type: string
    default: main
    displayName: 'Select backend branch to build'


variables:
  acrserviceconnection: 'acr-dependencytracktest-connection'
  acrname: 'acrdependencytracktest'
  imagebackend: 'dtrack-backend'
  dockerfilebackend: 'Dockerfile'


pool:
  vmImage: 'ubuntu-latest'


steps:
  - checkout: self
    clean: true
    ref: ${{ parameters.branch name }}
  
  - script: |
    SAFE_BRANCH=$(echo "${{ parameters.branchName }}" | tr '/' '-')
    echo "##vso[task.setvariable variable=safeBranch]$SAFE_BRANCH"
  displayName: "Sanitize branch name"


  task: Docker@2
    displayName: 'Build and Push Backend Image'
    inputs:
      command: 'buildAndPush'
      repository: '$(acrname).azurecr.io/$(imagebackend)'
      dockerfile: '$(dockerfilebackend)'
      containerRegistry: '$(acrserviceconnection)'
      tags: |
        be-$(safebranch)
        be-commit-$(Build.SourceVersion)

