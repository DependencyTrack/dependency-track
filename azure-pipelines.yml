trigger: none
pr: none

parameters:
  - name: enableDeployment
    displayName: 'Deploy to App Service'
    type: boolean
    default: false

variables:
  acrserviceconnection: 'acr-dependencytracktest-connection'
  appserviceconnection: 'acr-dependencytracktest-connection'
  acrname: 'acrdependencytracktest'
  imagebackend: 'dtrack-backend'
  dockerfilebackend: 'Dockerfile'
  appServiceName: 'app-dependencytrack-backend-test'
  resourceGroupName: 'rg-dependencytrack-backend-test'
  registryUrl: '$(acrname).azurecr.io'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build Docker Image'
    jobs:
      - job: BuildBackend
        displayName: 'Build and Push Backend Image'
        steps:
          - checkout: self
            clean: true

          - task: Docker@2
            displayName: 'Build and Push Backend Image'
            inputs:
              command: 'buildAndPush'
              repository: '$(imagebackend)'
              dockerfile: '$(dockerfilebackend)'
              buildContext: '$(System.DefaultWorkingDirectory)'
              containerRegistry: '$(acrserviceconnection)'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: 'Deploy to App Service'
    dependsOn: Build
    condition: and(succeeded(), eq(${{ parameters.enableDeployment }}, true))
    jobs:
      - deployment: DeployBackend
        displayName: 'Deploy Backend to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureAppServiceManage@0
                  displayName: 'Restart Backend App Service'
                  inputs:
                    azureSubscription: '$(appserviceconnection)'
                    action: 'Restart Azure App Service'
                    appType: 'webAppContainer'
                    appName: '$(appServiceName)'
                    resourceGroupName: '$(resourceGroupName)'

