name: dtrack-dev

services:
  traefik:
    image: traefik:v3
    command:
    - "--providers.docker=true"
    - "--entrypoints.web.address=:8080"
    ports:
    - "127.0.0.1:8080:8080"
    volumes:
    # For rootless Podman, set the DOCKER_SOCK environment variable:
    # export DOCKER_SOCK="$(podman system info --format='{{.Host.RemoteSocket.Path}}')"
    - "${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro"
    restart: unless-stopped

  frontend:
    image: "ghcr.io/dependencytrack/hyades-frontend:${DT_FRONTEND_VERSION:-snapshot}"
    environment:
      API_BASE_URL: "http://localhost:8080"
    labels:
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: "PathPrefix(`/`)"
      traefik.http.routers.frontend.priority: "1"
    healthcheck:
      test: [ "NONE" ]
    restart: unless-stopped

  apiserver:
    image: "ghcr.io/dependencytrack/apiserver:${DT_APISERVER_VERSION:-5-snapshot}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.apiserver.rule: "PathPrefix(`/api`)"
      traefik.http.routers.apiserver.priority: "2"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      endpoint_mode: dnsrr
      mode: replicated
      replicas: 3
      resources:
        limits:
          memory: 1g
    environment:
      ALPINE_BCRYPT_ROUNDS: "4"
      DT_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/dtrack"
      DT_DATASOURCE_USERNAME: "dtrack"
      DT_DATASOURCE_PASSWORD: "dtrack"
      DT_TELEMETRY_SUBMISSION_ENABLED_DEFAULT: "false"
    healthcheck:
      test: [ "NONE" ]
    volumes:
    - "apiserver-data:/data"
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: "dtrack"
      POSTGRES_USER: "dtrack"
      POSTGRES_PASSWORD: "dtrack"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
    - "127.0.0.1:5432:5432"
    volumes:
    - "postgres-data:/var/lib/postgresql"
    restart: unless-stopped

volumes:
  apiserver-data: {}
  postgres-data: {}
