syntax = "proto3";

package org.dependencytrack.pkgmetadata.resolution.cache.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "org.dependencytrack.pkgmetadata.resolution.cache.proto.v1";

message CacheEntry {
  // Until when the entry is to be considered "fresh".
  google.protobuf.Timestamp fresh_until = 1;

  // Value of the ETag header as returned by the server.
  optional string etag = 2;

  // Value of the Last-Modified header as returned by the server.
  optional string last_modified = 3;

  // The max-age as declared by the server at the time the entry was populated.
  // Retained so that a subsequent 304 without a Cache-Control header can
  // preserve the original freshness lifetime, as per RFC 9111.
  optional google.protobuf.Duration max_age = 4;

  // A cached subset of response headers with lower-cased keys.
  // Only populated for HEAD requests.
  // Validators (etag, last_modified) live in their dedicated
  // fields and are not duplicated here.
  map<string, string> headers = 5;

  // The cached response body.
  optional bytes body = 6;
}
