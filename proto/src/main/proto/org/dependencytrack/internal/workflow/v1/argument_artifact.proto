syntax = "proto3";

package org.dependencytrack.internal.workflow.v1;

import "org/dependencytrack/filestorage/v1/filestorage.proto";

option java_multiple_files = true;
option java_package = "org.dependencytrack.proto.internal.workflow.v1";

message ImportBomArg {
  string project_uuid = 1;
  string project_name = 2;
  string project_version = 3;
  string bom_upload_token = 4;
  org.dependencytrack.filestorage.v1.FileMetadata bom_file_metadata = 5;
}

message ImportVexArg {
  string project_uuid = 1;
  string project_name = 2;
  string project_version = 3;
  string vex_upload_token = 4;
  org.dependencytrack.filestorage.v1.FileMetadata vex_file_metadata = 5;
}
